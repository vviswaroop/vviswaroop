<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="100%" height="100%">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#18181b" />
      <stop offset="100%" stop-color="#27272a" />
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#09090b" />
      <stop offset="100%" stop-color="#020202" />
    </linearGradient>
  </defs>

  <style>
    .window-border { stroke: #3f3f46; stroke-width: 1.5; }
    .title { fill: #a1a1aa; font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace; font-size: 13px; font-weight: 500; }
    .prompt { fill: #38bdf8; font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace; font-size: 14px; font-weight: bold; }
    .cmd { fill: #f4f4f5; font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace; font-size: 14px; }
    .output-label { fill: #00c2ff; font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace; font-size: 14px; font-weight: 600; }
    .json-key { fill: #f43f5e; font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace; font-size: 13px; }
    .json-val { fill: #34d399; font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace; font-size: 13px; }
    .json-bracket { fill: #e4e4e7; font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace; font-size: 13px; }
    
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    .cursor {
      fill: #00c2ff;
      animation: blink 1s infinite;
    }
  </style>

  <!-- Window shadow and background -->
  <rect x="5" y="5" width="790" height="340" rx="10" ry="10" fill="#000000" opacity="0.3" filter="blur(5px)" />
  <rect x="0" y="0" width="800" height="340" rx="10" ry="10" fill="url(#bodyGrad)" class="window-border" />

  <!-- Window Header -->
  <path d="M 0 10 A 10 10 0 0 1 10 0 L 790 0 A 10 10 0 0 1 800 10 L 800 35 L 0 35 Z" fill="url(#headerGrad)" />
  
  <!-- Window Buttons -->
  <circle cx="20" cy="17" r="6" fill="#ef4444" />
  <circle cx="40" cy="17" r="6" fill="#eab308" />
  <circle cx="60" cy="17" r="6" fill="#22c55e" />

  <!-- Window Title -->
  <text x="400" y="22" text-anchor="middle" class="title">vviswaroop@platform-engineer:~</text>

  <!-- Terminal Content -->
  <!-- Line 1: whoami -->
  <text x="25" y="65" class="prompt">vviswaroop ~ %</text>
  <text x="145" y="65" class="cmd">whoami</text>
  <text x="25" y="90" class="output-label">Viswaroop Vadlamudi | Staff Platform Engineer &amp; DevSecOps Architect</text>

  <!-- Line 2: cat focus.json -->
  <text x="25" y="125" class="prompt">vviswaroop ~ %</text>
  <text x="145" y="125" class="cmd">cat focus.json</text>
  
  <!-- JSON Block -->
  <text x="25" y="150" class="json-bracket">{</text>
  
  <text x="50" y="175" class="json-key">"platform_engineering"</text>
  <text x="245" y="175" class="json-bracket">:</text>
  <text x="260" y="175" class="json-val">"Kubernetes-as-a-Service, GitOps (ArgoCD/Helm), Multi-Cloud (EKS/GKE)"</text>
  <text x="770" y="175" class="json-bracket">,</text>
  
  <text x="50" y="200" class="json-key">"devsecops_identity"</text>
  <text x="245" y="200" class="json-bracket">:</text>
  <text x="260" y="200" class="json-val">"Zanzibar (OpenFGA), OAuth2 (Ory Hydra), Policy-as-Code (OPA)"</text>
  <text x="770" y="200" class="json-bracket">,</text>
  
  <text x="50" y="225" class="json-key">"ai_native_ops"</text>
  <text x="245" y="225" class="json-bracket">:</text>
  <text x="260" y="225" class="json-val">"Secure LLM execution, Firecracker microVM sandboxes, AI agents"</text>
  
  <text x="25" y="250" class="json-bracket">}</text>

  <!-- Line 3: active prompt with blinking cursor -->
  <text x="25" y="290" class="prompt">vviswaroop ~ %</text>
  <text x="145" y="290" class="cmd">explore --agentic-future</text>
  <rect x="365" y="275" width="10" height="18" class="cursor" />
</svg>
